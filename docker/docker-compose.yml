# Orchestrates the reconstruction images. The whole repo is bind-mounted at /work so
# projects/, calib/, scripts/, data/ are all visible inside every container.
#
# Build order matters: recon-dl is FROM recon-sfm:latest, so build `sfm` before `dl`
# (the `recon build` dispatcher does this for you).

services:
  sfm:
    build:
      context: ..
      dockerfile: docker/recon-sfm/Dockerfile
      args:
        CUDA_TAG: ${CUDA_TAG:-12.9.1-devel-ubuntu24.04}
        CUDA_ARCH: ${CUDA_ARCH:-120}
    image: recon-sfm:latest
    volumes:
      - ..:/work
    working_dir: /work
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  dl:
    build:
      context: ..
      dockerfile: docker/recon-dl/Dockerfile
      args:
        SFM_IMAGE: recon-sfm:latest
        TORCH_CUDA_ARCH_LIST: ${TORCH_CUDA_ARCH_LIST:-12.0}
    image: recon-dl:latest
    volumes:
      - ..:/work
    working_dir: /work
    shm_size: "8gb"          # nerfstudio/torch dataloaders need ample /dev/shm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # OpenDroneMap: classic photogrammetry (ortho/DEM/mesh/dense cloud).
  # Projects are mounted at /datasets; run e.g.:
  #   recon odm --project-path /datasets drone_site1 --orthophoto-resolution 2
  odm:
    image: opendronemap/odm:latest
    volumes:
      - ../projects:/datasets
